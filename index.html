<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101116">
    <title>Для тебя</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="ambient-sky" aria-hidden="true">
      <div class="star-field" id="star-field"></div>
      <span class="meteor meteor-a"></span>
      <span class="meteor meteor-b"></span>
      <span class="meteor meteor-c"></span>
      <span class="meteor meteor-d"></span>
    </div>

    <main class="page-shell">
      <section class="hero" aria-label="Начало">
        <div class="hero-constellations" aria-hidden="true">
          <svg class="constellation constellation-taurus" viewBox="0 0 329 333">
            <path class="constellation-line" pathLength="1" d="M319.5 9.5 260.5 119.5 199.5 161.5 136.5 180.5 9.5 256.5 M199.5 161.5 170.5 209.5 68.5 323.5"></path>
            <circle class="constellation-star constellation-star-major" cx="9.5" cy="256.5" r="4"></circle>
            <circle class="constellation-star constellation-star-major" cx="68.5" cy="323.5" r="3.8"></circle>
            <circle class="constellation-star" cx="136.5" cy="180.5" r="2.7"></circle>
            <circle class="constellation-star" cx="170.5" cy="209.5" r="2.7"></circle>
            <circle class="constellation-star constellation-star-major" cx="199.5" cy="161.5" r="4.7"></circle>
            <circle class="constellation-star" cx="260.5" cy="119.5" r="2.8"></circle>
            <circle class="constellation-star constellation-star-major" cx="319.5" cy="9.5" r="4.2"></circle>
            <text class="constellation-label" x="245" y="250" text-anchor="middle">Taurus</text>
          </svg>

          <svg class="constellation constellation-cancer" viewBox="0 0 303 244">
            <path class="constellation-line" pathLength="1" d="M293.5 9.5 196.5 91.5 117.5 110.5 54.5 234.5 M117.5 110.5 9.5 91.5"></path>
            <circle class="constellation-star constellation-star-major" cx="9.5" cy="91.5" r="4"></circle>
            <circle class="constellation-star constellation-star-major" cx="54.5" cy="234.5" r="3.8"></circle>
            <circle class="constellation-star constellation-star-major" cx="117.5" cy="110.5" r="4.7"></circle>
            <circle class="constellation-star" cx="196.5" cy="91.5" r="2.7"></circle>
            <circle class="constellation-star constellation-star-major" cx="293.5" cy="9.5" r="4.1"></circle>
            <text class="constellation-label" x="150" y="40" text-anchor="middle">Cancer </text>
          </svg>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">это только для тебя</p>
          <h1 id="hero-title"></h1>
          <p id="hero-text" class="hero-text"></p>
        </div>

        <div class="hero-photos" aria-label="Ваши фотографии">
          <figure class="photo-card photo-card-large">
            <img id="hero-photo-main" src="photos/photo1.jpg" alt="Наша фотография" decoding="async" fetchpriority="high">
          </figure>
          <figure class="photo-card photo-card-small">
            <img id="hero-photo-side" src="photos/photo2.jpg" alt="Еще одна наша фотография" decoding="async">
          </figure>
        </div>
      </section>

      <section id="letter" class="letter-section">
        <div class="letter-layout">
          <div class="letter-meta">
            <span class="section-kicker">моё письмо</span>
          </div>
          <div class="letter-scene">
            <article class="letter-paper" aria-label="Письмо">
              <p id="letter-line-1"></p>
              <p id="letter-line-2"></p>
              <p id="letter-line-3"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="memories-section" aria-label="Воспоминания">
        <div class="section-heading">
          <span class="section-kicker">то, что я берегу</span>
          <h2>Наши маленькие бесконечности</h2>
        </div>
        <div id="memory-grid" class="memory-grid"></div>
      </section>

      <section class="final-section" aria-label="Финал">
        <div class="final-reveal">
          <p class="final-reveal-text">
            Все эти дни нас разделяли тысячи километров, но над нами всё это время было одно и то же небо.
            <strong>И самое важное я хочу сказать тебе не здесь.</strong>
          </p>
          <div class="final-reveal-action">
            <button class="final-reveal-button" id="final-reveal-button" type="button" aria-haspopup="dialog" aria-controls="final-message-modal">
              <span class="final-reveal-title">Но это ещё не всё...</span>
              <span class="final-reveal-hint">Нажми, чтобы продолжить</span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <div class="lightbox" id="photo-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" inert>
      <button class="lightbox-backdrop" type="button" aria-label="Закрыть"></button>
      <div class="lightbox-dialog">
        <button class="lightbox-close" type="button" aria-label="Закрыть">×</button>
        <figure class="lightbox-figure">
          <img id="lightbox-image" class="lightbox-image" src="" alt="">
          <figcaption class="lightbox-caption">
            <strong id="lightbox-title"></strong>
            <span id="lightbox-text"></span>
          </figcaption>
        </figure>
      </div>
    </div>

    <div class="message-modal" id="final-message-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="final-message-title" inert>
      <button class="message-modal-backdrop" type="button" aria-label="Закрыть"></button>
      <div class="message-modal-dialog">
        <button class="message-modal-close" type="button" aria-label="Закрыть">&times;</button>
        <h2 id="final-message-title">А теперь, пожалуйста, доверься мне и выйди на улицу</h2>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
