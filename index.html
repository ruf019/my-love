<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101116">
    <title>Для тебя</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="ambient-sky" aria-hidden="true">
      <span class="ambient-shooting-star ambient-shooting-star-a"></span>
      <span class="ambient-shooting-star ambient-shooting-star-b"></span>
      <span class="ambient-shooting-star ambient-shooting-star-c"></span>
    </div>

    <main class="page-shell">
      <section class="hero" aria-label="Начало">
        <div class="night-sky" aria-hidden="true">
          <span class="star star-a"></span>
          <span class="star star-b"></span>
          <span class="star star-c"></span>
          <span class="star star-d"></span>
          <span class="star star-e"></span>
          <span class="star star-f"></span>
          <span class="star star-g"></span>
          <span class="star star-h"></span>
          <span class="star star-i"></span>
          <span class="star star-j"></span>
          <span class="star star-k"></span>
          <span class="star star-l"></span>
          <span class="star star-m"></span>
          <span class="star star-n"></span>
          <span class="star star-o"></span>
          <span class="star star-p"></span>
          <span class="shooting-star shooting-star-a"></span>
          <span class="shooting-star shooting-star-b"></span>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">это только для тебя</p>
          <h1 id="hero-title">Я хочу сказать тебе самое важное</h1>
          <p id="hero-text" class="hero-text">
            Не чтобы спорить, не чтобы оправдываться. Просто чтобы ты увидела:
            я понял, где был неправ, и правда хочу быть рядом иначе.
          </p>
        </div>

        <div class="hero-photos" aria-label="Ваши фотографии">
          <figure class="photo-card photo-card-large" data-photo-label="ваше главное фото">
            <img id="hero-photo-main" src="photos/photo1.jpg" alt="Наша фотография">
          </figure>
          <figure class="photo-card photo-card-small" data-photo-label="еще один момент">
            <img id="hero-photo-side" src="photos/photo2.jpg" alt="Еще одна наша фотография">
          </figure>
        </div>
      </section>

      <section id="letter" class="letter-section">
        <div class="letter-layout">
          <div class="letter-meta">
            <span class="section-kicker">мое письмо</span>
          </div>
          <article class="letter-paper" aria-label="Письмо">
            <p id="letter-line-1"></p>
            <p id="letter-line-2"></p>
            <p id="letter-line-3"></p>
          </article>
        </div>
      </section>

      <section class="memories-section" aria-label="Воспоминания">
        <div class="section-heading">
          <span class="section-kicker">то, что я берегу</span>
          <h2>Наши маленькие бесконечности</h2>
        </div>
        <div id="memory-grid" class="memory-grid"></div>
      </section>

      <section class="final-section" aria-label="Финал">
        <div class="final-card">
          <h2>А сейчас доверься мне и выйди на улицу</h2>
        </div>
      </section>
    </main>

    <div class="lightbox" id="photo-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" inert>
      <button class="lightbox-backdrop" type="button" aria-label="Закрыть"></button>
      <div class="lightbox-dialog">
        <button class="lightbox-close" type="button" aria-label="Закрыть">×</button>
        <figure class="lightbox-figure">
          <img id="lightbox-image" class="lightbox-image" src="" alt="">
          <figcaption class="lightbox-caption">
            <strong id="lightbox-title"></strong>
            <span id="lightbox-text"></span>
          </figcaption>
        </figure>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
